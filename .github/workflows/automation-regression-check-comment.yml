name: Automation Regression Check Comment

on:
  workflow_run:
    workflows: ['Automation Regression Check']
    types: [completed]

jobs:
  post-pr-comment:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
      issues: write

    steps:
      - name: Download comparison results
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const pullRequests = context.payload.workflow_run.pull_requests;
            if (!pullRequests?.length) {
              console.log('No pull request associated with workflow run, skipping comment');
              return;
            }

            const resultPath = path.join('compare-result.json');
            if (!fs.existsSync(resultPath)) {
              console.log('No compare-result.json artifact, skipping comment');
              return;
            }

            const { has_diff: hasDiff, original_exists: originalExists } = JSON.parse(
              fs.readFileSync(resultPath, 'utf8')
            );

            if (!originalExists) {
              console.log('No original file to compare against, skipping comment');
              return;
            }

            const diffPath = path.join('diff_output.txt');
            let diffContent = '';
            if (hasDiff && fs.existsSync(diffPath) && fs.statSync(diffPath).size > 0) {
              diffContent = fs.readFileSync(diffPath, 'utf8');
            }

            let comment;
            if (hasDiff) {
              comment = [
                '## ⚠️ Automation Output Diff Detected',
                '',
                'The generated `output/python.py` differs from the expected output.',
                '',
                '<details>',
                '<summary>View diff</summary>',
                '',
                '```diff',
                diffContent,
                '```',
                '',
                '</details>',
                '',
                'Please review the changes and update `output/python.py` if the changes are intentional.',
              ].join('\n');
            } else {
              comment = [
                '## ✅ Automation Regression Check Passed',
                '',
                'The generated `output/python.py` matches the expected output.',
              ].join('\n');
            }

            await github.rest.issues.createComment({
              issue_number: pullRequests[0].number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });
