name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-shard:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.3.14'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache Rust (wasm crate)
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: wasm/neofoodclub_rs

    - name: Install wasm-pack
      uses: jetli/wasm-pack-action@v0.4.0

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(jq -r .version < node_modules/@playwright/test/package.json)" >> $GITHUB_OUTPUT

    - name: Cache Playwright browsers
      uses: actions/cache@v6
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: bunx playwright install --with-deps chromium firefox webkit

    - name: Install Playwright system dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: bunx playwright install-deps chromium firefox webkit

    - name: Run Playwright tests (shard ${{ matrix.shard }}/4)
      run: bunx playwright test --shard=${{ matrix.shard }}/4

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: playwright-report-${{ matrix.shard }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results-${{ matrix.shard }}
        path: test-results/
        retention-days: 30

  test:
    name: test
    needs: test-shard
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check shard results
      run: |
        if [ "${{ needs.test-shard.result }}" != "success" ]; then
          echo "One or more Playwright shards failed: ${{ needs.test-shard.result }}"
          exit 1
        fi
